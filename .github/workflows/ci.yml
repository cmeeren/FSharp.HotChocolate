name: CI

on:
  - push
  - pull_request
  - workflow_dispatch

permissions:
  contents: read

jobs:
  ci:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0

      - name: Restore tools
        run: dotnet tool restore

      - name: Check code format
        run: dotnet fantomas --check .

      - name: Test
        run: dotnet test -c Release -maxCpuCount

      - name: Pack
        run: dotnet pack -c Release src/FSharp.HotChocolate/FSharp.HotChocolate.fsproj --output artifacts/packages

  publish:

    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v/')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0

      - name: Pack
        run: dotnet pack -c Release src/FSharp.HotChocolate/FSharp.HotChocolate.fsproj --output artifacts/packages

      - name: NuGet login
        uses: NuGet/login@v1.2.0
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push artifacts/packages/*.nupkg -s "https://api.nuget.org/v3/index.json" -k "$NUGET_API_KEY" --skip-duplicate
