schema {
  query: Query
}

type Query {
  "Fetches an object given its ID."
  node("ID of the object." id: ID!): Node
  "Lookup nodes by a list of IDs."
  nodes("The list of node IDs." ids: [ID!]!): [Node]!
  asyncOfOptionOfInt(returnNull: Boolean!): Int
  asyncOfOptionOfString(returnNull: Boolean!): String
  asyncBoxedFieldWithDescriptor: MyUnion!
  asyncOfInt: Int!
  asyncOfString: String!
  asyncHasRequestCancellationToken: Boolean!
}

type A {
  x: Int!
}

type B {
  y: String!
}

type MyNodeAsync implements Node {
  id: ID!
}

type MyNodeAsyncResult implements Node {
  id: ID!
}

"The node interface is implemented by entities that have a global unique identifier."
interface Node {
  id: ID!
}

union MyUnion = A | B